<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Tab Groups</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="icons/icon48.png" width="24" height="24" alt="">
        <span class="title">Auto Tab Groups</span>
      </div>
    </header>

    <div class="stats" id="stats">
      <div class="stat-item">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-label">标签页</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-matched">—</span>
        <span class="stat-label">可分组</span>
      </div>
      <div class="stat-item">
        <span class="stat-num" id="stat-grouped">—</span>
        <span class="stat-label">已分组</span>
      </div>
    </div>

    <button class="btn-primary" id="btn-organize">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M12 10l2 2-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      一键整理所有标签页
    </button>

    <div class="status-msg" id="status-msg"></div>

    <footer>
      <a id="link-options" href="#">管理规则</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
